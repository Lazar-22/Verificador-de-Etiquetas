<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC | Flujo Corregido Falabella</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-slate-800 to-green-900 min-h-screen flex items-center justify-center p-4">

    <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <div class="bg-green-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                <i class="fas fa-barcode text-white text-2xl"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800">Falabella</h2>
            <p class="text-gray-500 text-sm mt-2">Cruce de Etiquetas v2.5</p>
        </div>
        
        <div class="space-y-6">
            <div class="relative">
                <label class="text-xs font-semibold text-green-600 uppercase tracking-wider ml-1">1. Orden de Venta</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-hashtag text-gray-400"></i>
                    </div>
                    <input type="text" id="order_name" autocomplete="off"
                        class="block w-full pl-10 pr-4 py-3 border-gray-200 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all text-gray-700" 
                        placeholder="Escanee Orden...">
                </div>
            </div>

            <div class="relative">
                <label class="text-xs font-semibold text-green-600 uppercase tracking-wider ml-1">2. Referencia del Cliente</label>
                <div class="mt-1 relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-user-tag text-gray-400"></i>
                    </div>
                    <input type="text" id="client_ref" autocomplete="off"
                        class="block w-full pl-10 pr-4 py-3 border-gray-200 border rounded-xl focus:ring-2 focus:ring-green-500 outline-none transition-all text-gray-700" 
                        placeholder="Escanee Referencia...">
                </div>
            </div>

            <div class="flex flex-col gap-4 pt-2">
                <button onclick="checkData()" 
                    class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition duration-300 flex items-center justify-center gap-2 group">
                    <span>Verificar Ahora</span>
                    <i class="fas fa-bolt"></i>
                </button>
                <a href="/" class="w-full text-center text-gray-500 hover:text-green-600 transition-colors text-sm font-medium py-2 flex items-center justify-center gap-2">
                    <i class="fas fa-chevron-left text-xs"></i> Volver al menú principal
                </a>
            </div>
        </div>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playTone(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }
    const soundSuccess = () => { playTone(880, 'sine', 0.2); setTimeout(() => playTone(1046, 'sine', 0.2), 100); };
    const soundError = () => { playTone(150, 'sawtooth', 0.6); };

    let jumpTimer;
    let verifyTimer;
    const interval = 100; 

    document.addEventListener("DOMContentLoaded", () => {
        const orderInput = document.getElementById('order_name');
        const refInput = document.getElementById('client_ref');

        // SALTO AUTOMÁTICO A CASILLA 2
        orderInput.addEventListener("input", (e) => {
            clearTimeout(jumpTimer);
            if (orderInput.value.trim().length > 0) {
                jumpTimer = setTimeout(() => {
                    if (document.activeElement === orderInput) {
                        refInput.focus();
                    }
                }, interval);
            }
        });

        // VERIFICACIÓN AUTOMÁTICA
        refInput.addEventListener("input", () => {
            clearTimeout(verifyTimer);
            if (orderInput.value && refInput.value) {
                verifyTimer = setTimeout(checkData, interval);
            }
        });

        orderInput.addEventListener("keypress", (e) => { if(e.key === "Enter") refInput.focus(); });
        refInput.addEventListener("keypress", (e) => { if(e.key === "Enter") checkData(); });
        
        orderInput.focus();
    });

    async function checkData() {
        // Cancelamos timers inmediatamente
        clearTimeout(jumpTimer);
        clearTimeout(verifyTimer);

        const nameInput = document.getElementById('order_name');
        const refInput = document.getElementById('client_ref');

        if (Swal.isVisible()) return;
        if(!nameInput.value || !refInput.value) return;

        refInput.classList.remove('border-red-500', 'ring-2', 'ring-red-500', 'shake');

        Swal.fire({ 
            title: 'Validando...', 
            allowOutsideClick: false, 
            didOpen: () => { Swal.showLoading() } 
        });

        try {
            const response = await fetch('/verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: nameInput.value, client_ref: refInput.value })
            });
            
            const result = await response.json();

            if (result.status === 'success') {
                soundSuccess();
                Swal.fire({
                    icon: 'success',
                    title: '¡Válido!',
                    text: result.message,
                    confirmButtonColor: '#16a34a',
                    timer: 1000,
                    // Usamos didClose para asegurar que el foco ocurra DESPUÉS de que cierre la ventana
                    didClose: () => {
                        nameInput.value = '';
                        refInput.value = '';
                        nameInput.focus(); 
                    }
                });
            } else {
                soundError();
                refInput.classList.add('border-red-500', 'ring-2', 'ring-red-500', 'shake');
                Swal.fire({
                    icon: 'error',
                    title: 'Error',
                    text: result.message,
                    confirmButtonColor: '#ef4444',
                    didClose: () => {
                        refInput.value = '';
                        refInput.focus();
                    }
                });
            }
        } catch (error) {
            soundError();
            Swal.fire({ 
                icon: 'error', 
                title: 'Error Red', 
                confirmButtonColor: '#ef4444',
                didClose: () => nameInput.focus()
            });
        }
    }
</script>
</body>
</html>
